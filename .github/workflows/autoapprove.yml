name: Auto-approve and merge updatecli PRs

on:
  pull_request:
    types:
      - opened
      - ready_for_review
      - synchronize

permissions:
  contents: write
  pull-requests: write

jobs:
  autoapprove:
    name: Auto-approve updatecli PR
    runs-on: ubuntu-latest
    # Only run for PRs from the known bot accounts used by updatecli/autobumper
    if: |
      github.actor == 'github-actions[bot]' ||
      github.actor == 'ci-robbot'
    steps:
      - name: Approve PR
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
