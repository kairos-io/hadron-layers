name: Auto-approve and merge bot PRs

## Approves and auto-merges (squash) PRs opened by the automation bots that
## run against this repo: updatecli (ci-robbot, opening PRs from the
## ci-forks/hadron-layers fork) and Renovate (renovate[bot], same-repo branch).
## All actors are treated identically — approve, then flip the PR to auto-merge
## so it lands once required checks pass.
##
## Uses pull_request_target so the workflow gets a write-scoped token even when
## the PR head is a fork (the case for updatecli via ci-forks). Safe because we
## gate on the PR author allow-list below and never check out PR code.
on:
  pull_request_target:
    types:
      - opened
      - ready_for_review
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  autoapprove:
    name: Auto-approve bot PR
    runs-on: ubuntu-latest
    ## Gate on the PR author (pull_request.user.login), NOT github.actor —
    ## with pull_request_target the actor is who last touched the PR event,
    ## which an attacker could game by adding a commit. The PR author is the
    ## identity that opened the PR and cannot be spoofed by a later push.
    if: |
      github.event.pull_request.user.login == 'github-actions[bot]' ||
      github.event.pull_request.user.login == 'ci-robbot' ||
      github.event.pull_request.user.login == 'renovate[bot]'
    steps:
      - name: Approve PR
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
