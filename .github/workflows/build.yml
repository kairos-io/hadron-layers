name: Build and push layer images

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Serialize runs per ref so only one main build runs at a time.
# Pushes to main queue and run in order (cancel-in-progress: false) to avoid
# cache races and older images overwriting newer ones. Pull request runs cancel
# their own superseded runs to save resources.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  packages: write

jobs:
  # Auto-discover layer directories. Every layer is built on every run — the
  # per-layer GHA cache (scope=<layer>, mode=max) short-circuits work when a
  # layer's inputs are unchanged, so change-detection at the workflow level
  # would only duplicate what BuildKit already does.
  discover:
    name: Discover layers
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Enumerate layer directories
        id: discover
        run: |
          # Convention: every top-level directory with a Dockerfile is a layer,
          # and the bake target name matches the directory name.
          MATRIX=$(find . -mindepth 2 -maxdepth 2 -name "Dockerfile" -not -path '*/.*/*' \
            | sed 's|^\./||; s|/Dockerfile$||' \
            | sort \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "Layers: $MATRIX"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  # Build each layer once per architecture on a NATIVE runner (no QEMU) so the
  # arm64 compile is as fast as amd64. Each (layer, arch) job pushes its image
  # by digest only — no per-arch tag — and the merge job below stitches the two
  # digests into a single multi-arch tag. Because the per-arch images are
  # untagged, nothing intermediate lingers in the registry.
  #
  # Cache is scoped per (layer, arch): amd64 and arm64 now run on separate
  # runners with separate BuildKit instances, so a shared scope would just race.
  # Within a job the smoke test and build share one BuildKit instance and one
  # scope, with the build step as the sole cache-to writer.
  build:
    name: Build ${{ matrix.layer }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        layer: ${{ fromJson(needs.discover.outputs.matrix) }}
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: oracle-vm-32cpu-128gb-x86-64
          - arch: arm64
            runner: oracle-vm-32cpu-128gb-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the Dockerfile's `test` stage and let any RUN in it execute. A
      # non-zero exit fails this job and prevents the build below from running.
      # Now runs natively on this arch, so arm64 gets real test coverage cheaply.
      # Reads the (layer, arch) cache only; the build step is the sole cache-to
      # writer, and the two steps share this job's local BuildKit cache so the
      # stages compiled here are reused by the build step for free.
      - name: Smoke test ${{ matrix.layer }} (${{ matrix.arch }})
        uses: docker/bake-action@v7
        with:
          targets: ${{ matrix.layer }}
          push: false
          set: |
            *.target=test
            *.output=type=cacheonly
            *.platform=linux/${{ matrix.arch }}
            *.cache-from=type=gha,scope=${{ matrix.layer }}-${{ matrix.arch }}

      # Build the release image for this single arch. On push/tag it is pushed
      # by digest (untagged) so the merge job can assemble a multi-arch tag; on
      # pull_request it is only built (type=cacheonly) to validate without
      # pushing. Sole cache-to writer of the (layer, arch) scope.
      - name: Build ${{ matrix.layer }} (${{ matrix.arch }})
        id: build
        uses: docker/bake-action@v7
        with:
          targets: ${{ matrix.layer }}
          push: false
          set: |
            *.platform=linux/${{ matrix.arch }}
            *.output=${{ github.event_name != 'pull_request' && format('type=image,name=ghcr.io/kairos-io/{0},push-by-digest=true,name-canonical=true,push=true', matrix.layer) || 'type=cacheonly' }}
            *.tags=
            *.cache-from=type=gha,scope=${{ matrix.layer }}-${{ matrix.arch }}
            *.cache-to=type=gha,scope=${{ matrix.layer }}-${{ matrix.arch }},mode=max

      # Persist the pushed image digest so the merge job can reference it.
      - name: Export digest
        if: github.event_name != 'pull_request'
        env:
          LAYER: ${{ matrix.layer }}
          METADATA: ${{ steps.build.outputs.metadata }}
        run: |
          mkdir -p /tmp/digests
          printf '%s' "$METADATA" > /tmp/metadata.json
          digest=$(jq -r --arg t "$LAYER" '.[$t]."containerimage.digest"' /tmp/metadata.json)
          if [ -z "$digest" ] || [ "$digest" = "null" ]; then
            echo "Error: no containerimage.digest for target $LAYER in bake metadata" >&2
            cat /tmp/metadata.json >&2
            exit 1
          fi
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.layer }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combine the per-arch digests for each layer into a single multi-arch image
  # tag. Skipped on pull_request (nothing was pushed there).
  merge:
    name: Merge ${{ matrix.layer }} manifest
    runs-on: ubuntu-latest
    needs: [discover, build]
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        layer: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # Extract the primary software version from the Dockerfile.
      # Convention: the first ARG with a default value (ARG NAME=value) that is
      # not HADRON_TOOLCHAIN_VERSION is the image's version tag.
      - name: Extract software version
        id: version
        env:
          LAYER: ${{ matrix.layer }}
        run: |
          VERSION=$(grep -E '^ARG [A-Z][A-Z_0-9]*_VERSION=' "$LAYER/Dockerfile" \
            | grep -v '^ARG HADRON_TOOLCHAIN_VERSION=' \
            | head -1 \
            | cut -d= -f2)
          if [[ -z "$VERSION" ]]; then
            echo "Error: no _VERSION ARG with a default value found in $LAYER/Dockerfile (or only HADRON_TOOLCHAIN_VERSION was present)"
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.layer }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        env:
          LAYER: ${{ matrix.layer }}
          VERSION: ${{ steps.version.outputs.value }}
          REGISTRY: ghcr.io/kairos-io
        run: |
          docker buildx imagetools create \
            -t "$REGISTRY/$LAYER:$VERSION" \
            $(printf "$REGISTRY/$LAYER@sha256:%s " *)

      - name: Inspect image
        env:
          LAYER: ${{ matrix.layer }}
          VERSION: ${{ steps.version.outputs.value }}
          REGISTRY: ghcr.io/kairos-io
        run: docker buildx imagetools inspect "$REGISTRY/$LAYER:$VERSION"
