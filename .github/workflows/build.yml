name: Build and push layer images

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Serialize runs per ref so only one main build runs at a time.
# Pushes to main queue and run in order (cancel-in-progress: false) to avoid
# cache races and older images overwriting newer ones. Pull request runs cancel
# their own superseded runs to save resources.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  packages: write

jobs:
  # Auto-discover layer directories. Every layer is built on every run — the
  # per-layer GHA cache (scope=<layer>, mode=max) short-circuits work when a
  # layer's inputs are unchanged, so change-detection at the workflow level
  # would only duplicate what BuildKit already does.
  discover:
    name: Discover layers
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Enumerate layer directories
        id: discover
        run: |
          # Convention: every top-level directory with a Dockerfile is a layer,
          # and the bake target name matches the directory name.
          MATRIX=$(find . -mindepth 2 -maxdepth 2 -name "Dockerfile" -not -path '*/.*/*' \
            | sed 's|^\./||; s|/Dockerfile$||' \
            | sort \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "Layers: $MATRIX"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.layer }} layer
    runs-on: oracle-vm-32cpu-128gb-x86-64
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        layer: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # Extract the primary software version from the Dockerfile.
      # Convention: the first ARG with a default value (ARG NAME=value) that is
      # not HADRON_TOOLCHAIN_VERSION is the image's version tag.
      - name: Extract software version
        id: version
        run: |
          VERSION=$(grep -E '^ARG [A-Z][A-Z_0-9]*_VERSION=' ${{ matrix.layer }}/Dockerfile \
            | grep -v '^ARG HADRON_TOOLCHAIN_VERSION=' \
            | head -1 \
            | cut -d= -f2)
          if [[ -z "$VERSION" ]]; then
            echo "Error: no _VERSION ARG with a default value found in ${{ matrix.layer }}/Dockerfile (or only HADRON_TOOLCHAIN_VERSION was present)"
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the Dockerfile's `test` stage and let any RUN in it execute.
      # A non-zero exit fails this job and prevents the release build below
      # from running. Kept amd64-only: arm64 test would need QEMU emulation
      # which is slow and rarely surfaces bugs the amd64 test does not.
      #
      # This step only READS the layer's cache (no cache-to). It shares the
      # buildx instance with the build-and-push step below, so the amd64 stages
      # it compiles stay in the local BuildKit cache and are reused there for
      # free — no duplicate work and no second cache scope. Crucially, letting
      # the release step be the *only* cache-to writer avoids the GHA
      # immutable-key conflict that previously dropped the arm64 layers (two
      # writers to one scope: the amd64-only smoke test claimed the key first,
      # so the release step's arm64 write was rejected and recompiled under
      # QEMU on every run).
      - name: Smoke test ${{ matrix.layer }} layer
        uses: docker/bake-action@v7
        with:
          targets: ${{ matrix.layer }}
          push: false
          set: |
            *.target=test
            *.output=type=cacheonly
            *.platform=linux/amd64
            *.cache-from=type=gha,scope=${{ matrix.layer }}

      # Sole writer of the layer cache scope, so cache-to never hits an
      # immutable-key conflict and both amd64 and arm64 layers persist between
      # runs. The amd64 stages compiled by the smoke test above are reused from
      # the shared local BuildKit cache, so only the arm64 stages are built here.
      - name: Build and push ${{ matrix.layer }} layer
        uses: docker/bake-action@v7
        with:
          targets: ${{ matrix.layer }}
          push: ${{ github.event_name != 'pull_request' }}
          set: |
            *.cache-from=type=gha,scope=${{ matrix.layer }}
            *.cache-to=type=gha,scope=${{ matrix.layer }},mode=max
        env:
          TAG: ${{ steps.version.outputs.value }}
