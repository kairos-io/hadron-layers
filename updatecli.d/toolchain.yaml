---
name: Hadron toolchain version updates

sources:
  hadron:
    kind: githubrelease
    spec:
      owner: kairos-io
      repository: hadron

targets:
  hadron_toolchain_bake:
    name: 'HADRON_TOOLCHAIN_VERSION in docker-bake.hcl updated to {{ source "hadron" }}'
    kind: hcl
    spec:
      file: docker-bake.hcl
      path: variable.HADRON_TOOLCHAIN_VERSION.default
    sourceid: hadron
