---
name: Git layer version updates

sources:
  git:
    kind: gittag
    spec:
      url: https://github.com/git/git.git
      versionfilter:
        kind: semver
        pattern: "*"
    transformers:
      - trimprefix: v

targets:
  git_version:
    name: 'GIT_VERSION in git/Dockerfile updated to {{ source "git" }}'
    kind: dockerfile
    spec:
      file: git/Dockerfile
      instruction:
        keyword: ARG
        matcher: GIT_VERSION
    sourceid: git
